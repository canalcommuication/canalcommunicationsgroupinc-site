<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canal Communications Group Inc</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(-45deg, #0b1f3a, #123a5c, #0b1f3a);
    background-size: 400% 400%;
    animation: flow 20s ease infinite;
    color: white;
}

@keyframes flow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    max-width: 900px;
    margin: 100px auto;
    text-align: center;
    padding: 20px;
}

h1 {
    font-size: 42px;
    margin-bottom: 20px;
}

p {
    font-size: 18px;
    line-height: 1.6;
}

.glass {
    background: rgba(255,255,255,0.08);
    padding: 30px;
    border-radius: 12px;
    backdrop-filter: blur(10px);
}
</style>
</head>

<body>

<div class="container">
    <div class="glass">
        <h1>Canal Communications Group Inc</h1>
        <p>
        Structured Growth. Strategic Communication. Directed Expansion.
        </p>
        <p>
        We support organizations in operational structuring,
        communication alignment, and scalable infrastructure development.
        </p>
    </div>
</div>

</body>
</html>
